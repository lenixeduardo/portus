<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PORTUS — Relatórios de Erro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263248;
      --border: rgba(255,255,255,0.08);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --radius: 8px;
      --mono: "IBM Plex Mono", "Fira Mono", "Consolas", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 span.badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      max-width: 480px;
    }

    .toolbar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .toolbar input:focus { border-color: var(--accent); }
    .toolbar input::placeholder { color: var(--muted); }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.error { background: var(--red); }

    .status-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

    main { padding: 24px; max-width: 960px; margin: 0 auto; }

    .summary {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      flex: 1;
      min-width: 140px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    #loading, #empty, #error-state {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 14px;
    }

    #error-state { color: var(--red); }

    .report-list { display: flex; flex-direction: column; gap: 12px; }

    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .report-card:hover { border-color: rgba(255,255,255,0.16); }

    .report-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      user-select: none;
    }

    .report-header:hover { background: var(--surface2); }

    .report-meta { flex: 1; min-width: 0; }

    .report-desc {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .report-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      font-family: var(--mono);
      white-space: nowrap;
    }

    .tag.platform { color: #a5b4fc; }
    .tag.time { color: var(--muted); }

    .expand-icon {
      color: var(--muted);
      font-size: 16px;
      flex-shrink: 0;
      transition: transform 0.2s;
      margin-top: 2px;
    }

    .report-card.open .expand-icon { transform: rotate(90deg); }

    .report-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px;
    }

    .report-card.open .report-body { display: block; }

    .report-full-desc {
      color: var(--text);
      font-size: 14px;
      margin-bottom: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .logs-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .logs-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
      line-height: 1.7;
    }

    .logs-block .log-line { display: block; }
    .logs-block .log-error { color: #fca5a5; }
    .logs-block .log-warn { color: #fde68a; }

    .copy-btn {
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 7px 16px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .pagination button:hover:not(:disabled) { border-color: var(--accent); }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination .page-info { line-height: 34px; font-size: 13px; color: var(--muted); }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: stretch; }
      .toolbar { max-width: none; }
      .summary { gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>
    PORTUS <span class="badge">LOGS</span>
  </h1>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Filtrar por descrição…" />
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">Conectando…</span>
  </div>
</header>

<main>
  <div class="summary">
    <div class="stat-card">
      <div class="value" id="stat-total">—</div>
      <div class="label">Relatórios totais</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-today">—</div>
      <div class="label">Hoje</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-last">—</div>
      <div class="label">Último relatório</div>
    </div>
  </div>

  <div id="loading">Carregando relatórios…</div>
  <div id="empty" style="display:none;">Nenhum relatório encontrado.</div>
  <div id="error-state" style="display:none;"></div>
  <div class="report-list" id="report-list"></div>
  <div class="pagination" id="pagination" style="display:none;">
    <button id="prev-btn" disabled>← Anterior</button>
    <span class="page-info" id="page-info"></span>
    <button id="next-btn">Próxima →</button>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://gvbzijlgvvqoelkimfzb.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2YnppamxndnZxb2Vsa2ltZnpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDYzNjcsImV4cCI6MjA5NzMyMjM2N30.4ADsC3XnurJWck3nRS3WqE5bMTan5fOakmVy9V1ZR9I";
  const PAGE_SIZE = 20;

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allReports = [];
  let filteredReports = [];
  let currentPage = 0;
  let searchQuery = "";
  let refreshTimer = null;

  const $loading = document.getElementById("loading");
  const $empty = document.getElementById("empty");
  const $errorState = document.getElementById("error-state");
  const $list = document.getElementById("report-list");
  const $pagination = document.getElementById("pagination");
  const $prevBtn = document.getElementById("prev-btn");
  const $nextBtn = document.getElementById("next-btn");
  const $pageInfo = document.getElementById("page-info");
  const $statTotal = document.getElementById("stat-total");
  const $statToday = document.getElementById("stat-today");
  const $statLast = document.getElementById("stat-last");
  const $statusDot = document.getElementById("status-dot");
  const $statusLabel = document.getElementById("status-label");
  const $search = document.getElementById("search");

  function setStatus(state) {
    $statusDot.className = "status-dot" + (state === "live" ? " live" : state === "error" ? " error" : "");
    $statusLabel.textContent = state === "live" ? "Ao vivo" : state === "error" ? "Erro de conexão" : "Conectando…";
  }

  function formatRelTime(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return "agora há pouco";
    if (m < 60) return `há ${m} min`;
    const h = Math.floor(m / 60);
    if (h < 24) return `há ${h}h`;
    const d = Math.floor(h / 24);
    return `há ${d}d`;
  }

  function formatAbsTime(isoStr) {
    return new Date(isoStr).toLocaleString("pt-BR", {
      day: "2-digit", month: "2-digit", year: "numeric",
      hour: "2-digit", minute: "2-digit", second: "2-digit"
    });
  }

  function colorLogLine(line) {
    const cls = /\[ERROR\]|\bERROR\b|\bError\b|Uncaught/i.test(line) ? " log-error"
      : /\[WARN\]|\bWARN\b|\bWarning\b/i.test(line) ? " log-warn"
      : "";
    const esc = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return `<span class="log-line${cls}">${esc}</span>`;
  }

  function renderCard(report) {
    const id = `r-${report.id}`;
    const platform = [report.platform, report.arch].filter(Boolean).join("/");
    const logs = Array.isArray(report.logs) ? report.logs : [];
    const logsHtml = logs.length
      ? logs.map(colorLogLine).join("\n")
      : "<span class='log-line muted'>(sem logs)</span>";

    return `
      <div class="report-card" id="${id}">
        <div class="report-header" onclick="toggleCard('${id}')">
          <div class="report-meta">
            <div class="report-desc" title="${report.description.replace(/"/g,'&quot;')}">${report.description.replace(/</g,"&lt;")}</div>
            <div class="report-tags">
              ${platform ? `<span class="tag platform">${platform}</span>` : ""}
              <span class="tag">${report.app || "PORTUS"}</span>
              <span class="tag time" title="${formatAbsTime(report.timestamp)}">${formatRelTime(report.timestamp)}</span>
              <span class="tag time">${formatAbsTime(report.timestamp)}</span>
              <span class="tag">${logs.length} linhas de log</span>
            </div>
          </div>
          <span class="expand-icon">▶</span>
        </div>
        <div class="report-body">
          <div class="report-full-desc">${report.description.replace(/</g,"&lt;").replace(/\n/g,"<br>")}</div>
          <div class="logs-label">Logs recentes</div>
          <div class="logs-block">${logsHtml}</div>
          <button class="copy-btn" onclick="copyLogs(event, '${id}')">Copiar logs</button>
        </div>
      </div>
    `;
  }

  function toggleCard(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle("open");
  }

  function copyLogs(e, id) {
    e.stopPropagation();
    const card = document.getElementById(id);
    const block = card && card.querySelector(".logs-block");
    if (!block) return;
    navigator.clipboard.writeText(block.textContent || "").then(() => {
      const btn = card.querySelector(".copy-btn");
      if (btn) { btn.textContent = "Copiado!"; setTimeout(() => { btn.textContent = "Copiar logs"; }, 2000); }
    });
  }

  function applyFilter() {
    const q = searchQuery.toLowerCase().trim();
    filteredReports = q
      ? allReports.filter(r => r.description.toLowerCase().includes(q) || (r.platform || "").toLowerCase().includes(q))
      : allReports.slice();
    currentPage = 0;
    renderPage();
  }

  function renderPage() {
    $list.innerHTML = "";
    $empty.style.display = "none";
    $loading.style.display = "none";

    if (filteredReports.length === 0) {
      $empty.style.display = "block";
      $pagination.style.display = "none";
      return;
    }

    const totalPages = Math.ceil(filteredReports.length / PAGE_SIZE);
    const start = currentPage * PAGE_SIZE;
    const page = filteredReports.slice(start, start + PAGE_SIZE);

    $list.innerHTML = page.map(renderCard).join("");

    if (totalPages > 1) {
      $pagination.style.display = "flex";
      $prevBtn.disabled = currentPage === 0;
      $nextBtn.disabled = currentPage >= totalPages - 1;
      $pageInfo.textContent = `Página ${currentPage + 1} de ${totalPages}`;
    } else {
      $pagination.style.display = "none";
    }
  }

  function updateStats() {
    const today = new Date().toISOString().slice(0, 10);
    const todayCount = allReports.filter(r => r.timestamp && r.timestamp.startsWith(today)).length;
    $statTotal.textContent = allReports.length;
    $statToday.textContent = todayCount;
    const last = allReports[0];
    $statLast.textContent = last ? formatRelTime(last.timestamp) : "—";
  }

  async function loadReports() {
    try {
      const { data, error } = await db
        .from("error_reports")
        .select("id, app, timestamp, description, platform, arch, logs")
        .order("timestamp", { ascending: false })
        .limit(1000);

      if (error) throw error;

      allReports = data || [];
      setStatus("live");
      updateStats();
      applyFilter();
      $errorState.style.display = "none";
    } catch (err) {
      console.error("Supabase error:", err);
      setStatus("error");
      if (allReports.length === 0) {
        $loading.style.display = "none";
        $errorState.style.display = "block";
        $errorState.textContent = "Erro ao conectar: " + (err.message || String(err));
      }
    }
  }

  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(async () => {
      await loadReports();
      scheduleRefresh();
    }, 30000);
  }

  $search.addEventListener("input", () => {
    searchQuery = $search.value;
    applyFilter();
  });

  $prevBtn.addEventListener("click", () => { if (currentPage > 0) { currentPage--; renderPage(); window.scrollTo(0,0); } });
  $nextBtn.addEventListener("click", () => {
    const total = Math.ceil(filteredReports.length / PAGE_SIZE);
    if (currentPage < total - 1) { currentPage++; renderPage(); window.scrollTo(0,0); }
  });

  // Supabase realtime subscription
  db.channel("error_reports")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "error_reports" }, (payload) => {
      allReports.unshift(payload.new);
      updateStats();
      applyFilter();
    })
    .subscribe((status) => {
      if (status === "SUBSCRIBED") setStatus("live");
      else if (status === "CHANNEL_ERROR") setStatus("error");
    });

  loadReports().then(scheduleRefresh);
</script>
</body>
</html>
