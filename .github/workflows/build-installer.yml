name: Build instalável (Windows)

# Gera o instalável NSIS (.exe) e cria uma Release a cada merge na main.
on:
  push:
    branches: [main]

# Cancela builds anteriores se outro merge chegar antes de este terminar.
concurrency:
  group: build-installer-main
  cancel-in-progress: true

jobs:
  package:
    name: npm run package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar instalável
        run: npm run package
        env:
          # Build não assinado: sem certificado, evita prompts/erros de assinatura.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Ler versão gerada
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Portus v${{ steps.version.outputs.version }}
          body: |
            Release gerada automaticamente a partir do merge na branch `main`.
            Commit: ${{ github.sha }}
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          fail_on_unmatched_files: false
